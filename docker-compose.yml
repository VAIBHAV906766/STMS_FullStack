services:
  postgres:
    image: postgres:16-alpine
    container_name: stms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stms_db
    ports:
      - "5432:5432"
    volumes:
      - stms_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stms_db"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  stms_pg_data:
